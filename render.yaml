services:
  # Backend API Service
  - type: web
    name: we-district-323a2-v2
    runtime: node
    region: singapore
    plan: free
    branch: main
    rootDir: Backend
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # ── Supabase ──────────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: club-images
      # ── Prisma (Supabase connection pooler URL) ───────────────
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      # ── Email ─────────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      # ── App ───────────────────────────────────────────────────
      - key: CLIENT_URL
        sync: false
    autoDeploy: true
